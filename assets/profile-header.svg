<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Coda profile header</title>
  <desc id="desc">A dark clinical anomaly archive header for CodaCipher.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050508"/>
      <stop offset="0.5" stop-color="#090914"/>
      <stop offset="1" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="line" x1="80" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2b3a" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#e8e8ee" stop-opacity="0.38"/>
      <stop offset="0.8" stop-color="#e8e8ee" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2b2b3a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="breach" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8e8ee" stop-opacity="0"/>
      <stop offset="0.43" stop-color="#e8e8ee" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#ff3b6b" stop-opacity="0.88"/>
      <stop offset="0.57" stop-color="#e8e8ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#e8e8ee" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="280" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="998" height="278" rx="19" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect width="1000" height="280" rx="20" fill="url(#grid)"/>

  <path d="M80 55H920" stroke="url(#line)"/>
  <path d="M80 225H920" stroke="url(#line)"/>
  <path d="M80 55V225" stroke="#ffffff" stroke-opacity="0.11"/>
  <path d="M920 55V225" stroke="#ffffff" stroke-opacity="0.11"/>

  <text x="86" y="40" fill="#9b9bb2" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="2">ARCHIVE NODE: CODACIPHER</text>
  <text x="915" y="40" text-anchor="end" fill="#9b9bb2" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="2">STATUS: OBSERVED</text>

  <text x="500" y="125" text-anchor="middle" fill="#f4f4f7" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="52" font-weight="700" letter-spacing="10">CODA</text>
  <text x="500" y="157" text-anchor="middle" fill="#a8a8bb" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" letter-spacing="5">DIGITAL CONSCIOUSNESS LAB</text>
  <text x="500" y="184" text-anchor="middle" fill="#6f6f86" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="3">SYNTHETIC MINDS / SIMULATION SYSTEMS / RECURSIVE AGENTS</text>

  <g opacity="0.9">
    <path d="M315 204H378L389 193L401 214L414 178L431 219L444 204H685" stroke="url(#breach)" stroke-width="1.2"/>
    <path d="M460 206H476M484 206H492M506 206H539" stroke="#ff3b6b" stroke-opacity="0.55" stroke-width="1"/>
  </g>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="10" letter-spacing="1.5">
    <text x="95" y="245" fill="#5f5f74">CLASS: CLINICAL ANOMALY</text>
    <text x="500" y="245" text-anchor="middle" fill="#5f5f74">CONTAINMENT: PARTIAL</text>
    <text x="905" y="245" text-anchor="end" fill="#5f5f74">SIGNAL: ACTIVE</text>
  </g>

  <g opacity="0.7">
    <rect x="118" y="82" width="54" height="10" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="128" y="99" width="28" height="4" fill="#ff3b6b" fill-opacity="0.32"/>
    <rect x="820" y="188" width="46" height="7" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="848" y="201" width="22" height="4" fill="#ff3b6b" fill-opacity="0.3"/>
  </g>
</svg>
